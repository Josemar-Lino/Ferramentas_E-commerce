<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comanda Mercado Livre </title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          automax: {
            red: '#b22222',
            dark: '#343a40',
            light: '#f8f9fa'
          }
        }
      }
    }
  }
</script>
<style>
  @media print {
    body * { visibility: hidden; }
    #tabela, #tabela * { visibility: visible; }
    #tabela { position: absolute; left: 0; top: 0; width: 100%; }

    th:last-child, td:last-child { display: none !important; }

    h2 { font-size: 48px !important; }

    table { border-collapse: collapse !important; font-size: 12pt; }
    th, td { border: 1px solid #000 !important; padding: 8px !important; }
    th { background-color: #b22222 !important; color: white !important; }
  }
</style>
</head>
<body class="bg-automax-light text-automax-dark min-h-screen p-6">

<h2 class="text-center text-3xl font-bold text-automax-red mb-6">Lista de Separação - Mercado Livre</h2>

<div class="bg-white p-6 rounded-xl shadow-md flex flex-wrap gap-4 justify-center mb-6" id="form-container">
  <label class="flex items-center gap-2 text-sm">
    Cliente:
    <input type="text" id="cliente" class="border rounded-md px-3 py-2 w-40">
  </label>
  <label class="flex items-center gap-2 text-sm">
    <input type="checkbox" id="kit"> Kit
  </label>
  <label class="flex items-center gap-2 text-sm">
    SKU:
    <input type="text" id="sku" class="border rounded-md px-3 py-2 w-32">
  </label>
  <label class="flex items-center gap-2 text-sm">
    Descrição:
    <input type="text" id="descricao" class="border rounded-md px-3 py-2 w-52">
  </label>
  <label class="flex items-center gap-2 text-sm">
    Quantidade:
    <input type="number" id="quantidade" class="border rounded-md px-3 py-2 w-20">
  </label>
  <label class="flex items-center gap-2 text-sm">
    Locação:
    <input type="text" id="locacao" class="border rounded-md px-3 py-2 w-32">
  </label>

  <label class="flex items-center gap-2 text-sm">
    Importar Excel:
    <input type="file" accept=".xlsx, .xls" onchange="importarExcel(event)">
  </label>

  <div class="flex gap-3 w-full justify-center mt-4">
    <button type="button" id="btnAdicionar" onclick="adicionarItem()" class="bg-automax-red text-white px-4 py-2 rounded-lg">Adicionar</button>
     <button id="btnImprimir" onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-semibold transition transform hover:scale-105">
      Imprimir
    </button>
    <button type="button" onclick="limparTudo()" class="bg-gray-600 text-white px-4 py-2 rounded-lg">Limpar Tudo</button>
  </div>
</div>

<div class="overflow-x-auto bg-white rounded-xl shadow-md">
  <table class="w-full border-collapse" id="tabela">
    <thead>
      <tr class="bg-automax-red text-white uppercase">
        <th class="p-3 text-left">Cliente</th>
        <th class="p-3 text-left">SKU</th>
        <th class="p-3 text-left">Descrição</th>
        <th class="p-3 text-left">Qtd</th>
        <th class="p-3 text-left">Locação</th>
        <th class="p-3 text-left">Ações</th>
      </tr>
    </thead>
    <tbody id="corpo-tabela"></tbody>
  </table>
</div>

<script>
let dados = [];
let editIndex = null;

function salvarDados() {
  localStorage.setItem("comandaAutomax", JSON.stringify(dados));
}

function carregarDados() {
  const armazenado = localStorage.getItem("comandaAutomax");
  if (armazenado) {
    dados = JSON.parse(armazenado);
    ordenarPorSKU();
    atualizarTabela();
  }
}

function adicionarItem() {
  const clienteInput = document.getElementById("cliente");
  const kit = document.getElementById("kit").checked;
  const cliente = clienteInput.value.trim();
  const sku = document.getElementById("sku").value.trim();
  const descricao = document.getElementById("descricao").value.trim();
  const quantidade = parseInt(document.getElementById("quantidade").value.trim());
  const locacao = document.getElementById("locacao").value.trim();

  if (!cliente || !sku || !descricao || isNaN(quantidade) || !locacao) {
    alert("Preencha todos os campos");
    return;
  }

  const clienteTexto = kit ? `${cliente} (Kit)` : cliente;

  if (editIndex !== null) {
    dados[editIndex] = { cliente: clienteTexto, sku: String(sku), descricao, quantidade, locacao };
    editIndex = null;
    document.getElementById("btnAdicionar").textContent = "Adicionar";
  } else {
    dados.push({ cliente: clienteTexto, sku: String(sku), descricao, quantidade, locacao });
  }

  ordenarPorSKU();
  salvarDados();
  atualizarTabela();
  limparFormulario();
}

function importarExcel(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });

    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

    json.forEach(linha => {
      // Normaliza nomes das colunas (case insensitive)
      const get = (obj, nomes) => {
        for (let key in obj) {
          if (nomes.includes(key.toLowerCase().trim())) {
            return obj[key];
          }
        }
        return '';
      };

      const item = {
        cliente: get(linha, ['cliente']),
        sku: String(get(linha, ['sku'])),
        descricao: get(linha, ['descrição','descricao']),
        quantidade: parseInt(get(linha, ['quantidade','qtd','qtde'])) || 0,
        locacao: get(linha, ['locação','locacao'])
      };

      if (item.sku) dados.push(item);
    });

    ordenarPorSKU();
    salvarDados();
    atualizarTabela();

    alert('Importação concluída!');
  };

  reader.readAsArrayBuffer(file);
}

function ordenarPorSKU() {
  dados.sort((a, b) => String(a.sku).localeCompare(String(b.sku)));
}

function atualizarTabela() {
  const tabela = document.getElementById("corpo-tabela");
  tabela.innerHTML = "";

  dados.forEach((item, index) => {
    tabela.innerHTML += `
      <tr>
        <td class="p-3">${item.cliente}</td>
        <td class="p-3">${item.sku}</td>
        <td class="p-3">${item.descricao}</td>
        <td class="p-3">${item.quantidade}</td>
        <td class="p-3">${item.locacao}</td>
        <td class="p-3">
          <button onclick="editarItem(${index})">Editar</button>
          <button onclick="removerItem(${index})">Remover</button>
        </td>
      </tr>
    `;
  });
}

function editarItem(index) {
  const item = dados[index];
  document.getElementById("cliente").value = item.cliente.replace(" (Kit)", "");
  document.getElementById("kit").checked = item.cliente.includes("(Kit)");
  document.getElementById("sku").value = item.sku;
  document.getElementById("descricao").value = item.descricao;
  document.getElementById("quantidade").value = item.quantidade;
  document.getElementById("locacao").value = item.locacao;
  editIndex = index;
  document.getElementById("btnAdicionar").textContent = "Salvar Alterações";
}

function removerItem(index) {
  dados.splice(index, 1);
  salvarDados();
  atualizarTabela();
}

function limparFormulario() {
  document.getElementById("cliente").value = '';
  document.getElementById("kit").checked = false;
  document.getElementById("sku").value = '';
  document.getElementById("descricao").value = '';
  document.getElementById("quantidade").value = '';
  document.getElementById("locacao").value = '';
}

function limparTudo() {
  if (confirm("Apagar tudo?")) {
    dados = [];
    salvarDados();
    atualizarTabela();
  }
}

function imprimir() {
  // Garante atualização antes de imprimir
  atualizarTabela();
  setTimeout(() => {
    window.print();
  }, 100);
}

window.onload = carregarDados;
</script>
</body>
</html>
